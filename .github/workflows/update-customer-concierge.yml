name: Update Customer Concierge Report

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "all_years = incremental ranges, force_all_years = rebuild all, single_range = only selected dates"
        required: false
        default: "all_years"
        type: choice
        options:
          - all_years
          - force_all_years
          - single_range
      start_date:
        description: "Optional start date YYYY-MM-DD. Required only for single_range. Example: 2025-05-07"
        required: false
        type: string
      end_date:
        description: "Optional end date YYYY-MM-DD. End date is inclusive. Example: 2026-05-07"
        required: false
        type: string
  schedule:
    # Daily refresh. Historical closed ranges are skipped; current/open range is updated.
    - cron: "0 9 * * *"

permissions:
  contents: write

jobs:
  update-report:
    runs-on: ubuntu-latest

    env:
      SHOPIFY_STORE_CORRO: ${{ secrets.SHOPIFY_STORE_CORRO }}
      SHOPIFY_TOKEN_CORRO: ${{ secrets.SHOPIFY_TOKEN_CORRO }}
      SHEET_ID_CORRO: ${{ secrets.SHEET_ID_CORRO }}
      GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      SHOPIFY_API_VERSION: ${{ vars.SHOPIFY_API_VERSION || '2026-04' }}
      REPORT_MODE: ${{ github.event.inputs.mode || vars.REPORT_MODE || 'all_years' }}
      REPORT_START_DATE: ${{ github.event.inputs.start_date || vars.REPORT_START_DATE }}
      REPORT_END_DATE: ${{ github.event.inputs.end_date || vars.REPORT_END_DATE }}
      HISTORICAL_START_DATE: ${{ vars.HISTORICAL_START_DATE }}
      FORCE_REFRESH_ALL_RANGES: ${{ github.event.inputs.mode == 'force_all_years' && 'true' || vars.FORCE_REFRESH_ALL_RANGES || 'false' }}
      JSON_RAW_LIMIT: ${{ vars.JSON_RAW_LIMIT || '5000' }}
      ONLY_CONCIERGE_TAGGED_ORDERS: ${{ vars.ONLY_CONCIERGE_TAGGED_ORDERS || 'true' }}
      CONCIERGE_TAG_KEYWORDS: ${{ vars.CONCIERGE_TAG_KEYWORDS || 'concierge' }}
      SELLER_TAG_PREFIXES: ${{ vars.SELLER_TAG_PREFIXES || 'seller:,sales:,sales rep:,sales_rep:,vendedora:,vendedor:,rep:' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate report ranges and update Google Sheet
        timeout-minutes: 360
        run: python -u customer_concierge_report.py -y

      - name: Commit updated dashboard data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update customer concierge report ranges"
          file_pattern: data/report.json
